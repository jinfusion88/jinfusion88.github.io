name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Required by actions/deploy-pages for OIDC-based deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          # Astro 5 requires Node >=22.12; the action defaults to Node 20
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
